<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>TP-2</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.4/jquery.min.js"></script>
</head>
<body>
    <header>
        <p>Trabajo práctico nro. 2 | Grupo 16</p>
    </header>
        <aside>
            <button id="btn-nueva" onclick="nuevaConsulta()" style="display: none;">Generar nueva consulta</button>
            <button id="btn-consultar" onclick="consultar()">Consultar API</button>
            <p id="cargando" style="visibility: hidden;">Cargando</p>
            <button id="btn-mostrar" onclick="mostrar()" disabled>Mostrar datos</button>
        </aside>
        <main>
            <fieldset id="contenedor-fechas">
                <p id="texto-desde">Desde</p>
                <input type="date" id="fecha-desde" onchange="fechaValidacion(this)">
                
                <p id="texto-hasta">Hasta</p>
                <input type="date" id="fecha-hasta" onchange="fechaValidacion(this)">
                
                <p class="aclaracion" id="error" style="display: none;"></p>
                <p class="aclaracion" id="aclaracion">(si no se selecciona fecha se consultará por defecto el inicio del dataset)</p>
            </fieldset>
            <fieldset id="contenedor-tipo-transporte">
                <input type="checkbox" id="check-todo" class="check" name="check-todo" checked>
                <label for="check-todo">Todo</label>
                
                <input type="checkbox" id="check-tren" class="check" name="check-todo">
                <label for="check-tren">Tren</label>
                
                <input type="checkbox" id="check-subte" class="check" name="check-todo">
                <label for="check-subte">Subte</label>
                
                <input type="checkbox" id="check-bondi" class="check" name="check-todo">
                <label for="check-bondi">Bondi</label>
                <p class="aclaracion" id="aclaracion">(si no se selecciona opción se consultará por defecto "todo")</p>
            </fieldset>
        </main>
    <footer>
        <p>Tecnología y Gestión Web</p>
    </footer>
    <script src="./script.js"></script>
</body>
</html>
