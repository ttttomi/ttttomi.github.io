<!DOCTYPE html>
<html lang="es" style="height: 100%;">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <link rel="stylesheet" href="styles.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Documento</title>
</head>
<body>
    <header>
        <img id="logo" src="https://s3.amazonaws.com/s3.timetoast.com/public/uploads/photo/13364410/image/d5229ab1b85398554076799983905537" height="100" width="100"/>
        <h4 id="nombre"> T.P. Nro. 1 - Catellani, Tomás </h4>
    </header>
    <section>
        <aside>
            <a id="api2" onclick="apiNASA()">API N.A.S.A.</a> <!--Retorna la foto astronómica del día-->
            <a id="api1" onclick="apiClima()">API clima</a> <!--Retorna el clima según latitud y longitud-->
        </aside>
        <main id="main">
            <h1 id="frase"> </h1>
            <p>A lo largo de la materia espero aprender los conocimientos básicos de programación web</p>
        </main>
    </section>
    <footer>
        Tecnología y Gestión Web 2023
    </footer>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@100;400;700&display=swap');

        body{
            display: flex;
            flex-direction: column;
            flex-wrap: nowrap;
            height: 100%;
            font-family: "IBM Plex Mono";
            margin: 0;
            background-color: whitesmoke;
            color: black;
        }

        header{
            display: flex;
            padding: 10px;
            border: 1px black solid;
        }

        #nombre{
            flex-grow: 1;
            text-align: center;
            align-self: center;
            font-size: 15pt;
        }

        section{
            display: flex;
            flex-grow: 1;
        }

        aside{ 
            min-width: 20%;
            border-right: 1px black solid;
            border-left: 1px black solid;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 30px; 
            padding: 20px;
            
            font-size: 20px;
            text-align: center;
        }

        main {
            display: flex;
            flex-grow: 1;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-right: 1px black solid;
            text-align: center;
        }

        main > img{
            max-width: 50%;
        }

        main > p{
            max-width: 70%;
        }

        #frase{
            font-size: 30pt;
        }

        p{
            text-align: center;
            padding: 20px;
        }

        .frase1{ text-shadow: 2px 2px 4px greenyellow; }
        .frase2{ text-shadow: 0px 3px 10px rgb(0, 0, 0); }
        .frase3{ text-shadow: -2px 2px 4px orangered }

        footer{
            text-align: right;
            padding: 10px;
            border: 1px black solid;
        }

    </style>
    <script>
        //Al cargar la venana 
        window.onload = (e) => {
            const frases = ["console.log('hola mundo')", "programar en C es espantoso", "error 404 not found"]
            const clase = ["frase1", "frase2", "frase3"]

            const index = Math.round(Math.random()*10) % 3; //Devuelve un entero aleatorio entre 0 y 2

            document.getElementById("frase").innerHTML = frases[index] //Utiliza el número como índice para la frase 
            document.getElementById("frase").className = clase[index]  //Utiliza el mismo número para la clase que le dará el estilo
        }


        //Api de la NASA que devuelve la fotografía astronómica del día
        function apiNASA(){
            fetch("https://api.nasa.gov/planetary/apod?api_key=LFvpOZF2x3aVqgtkcnyT7aEagWjBMIrM1AmoEapu", {method: "GET"})
            .then(resp => resp.json())
            .then((r) => { 
                document.getElementById("main").innerHTML = ""  //Quito los elementos que hay en el main
                document.getElementById("main").appendChild(document.createElement("h1")).innerHTML = `${r.title}` //Titulo de la fotografía
                document.getElementById("main").appendChild(document.createElement("img")).src = `${r.url}` //Al main le agrego una etiqueta img con la url que recupero del JSON
                document.getElementById("main").appendChild(document.createElement("p")).innerHTML = `${r.explanation}` //Descripción de la fotografía
            })
        }


        //Api de OpenWeather que retorna características del clima 
        function apiClima(){
            document.getElementById("main").style.backgroundImage = "none"; //Quito el fondo que pudo haber aplicado la funcion Api2()
            //Le envío como parámetros la latitud y longitud de La Plata, el idioma y el formato de las unidades (métrico)
            fetch("https://api.openweathermap.org/data/2.5/weather?lat=-34.92&lon=-57.95&appid=a13df24921a2b9f0449648b341a424ce&lang=es&units=metric", {method: "GET"})
            .then(resp => resp.json())
            .then ((r) => {
                document.getElementById("main").innerHTML = `<p>El clima en <b style="color:blue"> ${r.name} </b> es ${r.weather[0].description} y la temperatura es de 
${r.main.temp}</p>`
                document.getElementById("main").appendChild(document.createElement("img")).src = `https://openweathermap.org/img/wn/${r.weather[0].icon}@2x.png`
            });
        }
    </script>
</body>
</html>
